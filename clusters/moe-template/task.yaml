# Terradev Task YAML — Generalized MoE Model Inference Deployment
# Works with: GLM-5, Qwen 3.5, Mistral Large 3, DeepSeek V3/V4, Llama 5, etc.
#
# Usage:
#   terradev provision --task clusters/moe-template/task.yaml
#   terradev provision --task clusters/moe-template/task.yaml --set model_id=Qwen/Qwen3.5-397B-A17B

name: moe-inference
model: ${MODEL_ID:-zai-org/GLM-5-FP8}

resources:
  accelerators: ${GPU_TYPE:-H100}:${GPU_COUNT:-8}
  cloud: any  # runpod, vastai, lambda, aws, coreweave
  instance_type: any
  use_spot: false
  cpu: ${CPU_COUNT:-96}
  memory: ${MEMORY_GB:-512}+
  disk_size: ${DISK_SIZE_GB:-500}

workdir: ~/moe-workspace

setup: |
  set -e
  MODEL_ID="${MODEL_ID:-zai-org/GLM-5-FP8}"
  BACKEND="${BACKEND:-vllm}"

  if [ "$BACKEND" = "vllm" ]; then
    pip install -U vllm --pre \
      --index-url https://pypi.org/simple \
      --extra-index-url https://wheels.vllm.ai/nightly
  fi

  # Upgrade transformers for latest MoE architectures
  pip install git+https://github.com/huggingface/transformers.git
  pip install accelerate>=1.10.1

  # Pre-download model weights
  pip install huggingface-hub
  python3 -c "
  from huggingface_hub import snapshot_download
  import os
  token = os.environ.get('HF_TOKEN', '')
  snapshot_download(
      '${MODEL_ID}',
      local_dir='/models/weights',
      token=token if token else None,
      max_workers=8
  )
  print('Model weights downloaded successfully')
  "

run: |
  set -e
  MODEL_ID="${MODEL_ID:-zai-org/GLM-5-FP8}"
  MODEL_NAME="${MODEL_NAME:-moe-model}"
  TP_SIZE="${TP_SIZE:-8}"
  GPU_MEM_UTIL="${GPU_MEM_UTIL:-0.85}"
  MAX_MODEL_LEN="${MAX_MODEL_LEN:-32768}"
  BACKEND="${BACKEND:-vllm}"
  PORT="${PORT:-8000}"

  echo "Deploying MoE inference endpoint via Terradev"
  echo "Model: $MODEL_ID"
  echo "Backend: $BACKEND"
  echo "TP Size: $TP_SIZE"
  echo "Provider: $TERRADEV_PROVIDER"
  echo "Region: $TERRADEV_REGION"

  if [ "$BACKEND" = "vllm" ]; then
    vllm serve /models/weights \
      --tensor-parallel-size $TP_SIZE \
      --gpu-memory-utilization $GPU_MEM_UTIL \
      --max-model-len $MAX_MODEL_LEN \
      --dtype auto \
      --trust-remote-code \
      --enable-auto-tool-choice \
      --served-model-name $MODEL_NAME \
      --host 0.0.0.0 \
      --port $PORT
  else
    python3 -m sglang.launch_server \
      --model-path /models/weights \
      --tp-size $TP_SIZE \
      --mem-fraction-static $GPU_MEM_UTIL \
      --trust-remote-code \
      --served-model-name $MODEL_NAME \
      --host 0.0.0.0 \
      --port $PORT
  fi

envs:
  MODEL_ID: "zai-org/GLM-5-FP8"
  MODEL_NAME: "moe-model"
  TP_SIZE: "8"
  GPU_MEM_UTIL: "0.85"
  MAX_MODEL_LEN: "32768"
  BACKEND: "vllm"
  PORT: "8000"
  GPU_TYPE: "H100"
  GPU_COUNT: "8"
  CPU_COUNT: "96"
  MEMORY_GB: "512"
  DISK_SIZE_GB: "500"
  TERRADEV_PROVIDER: ""
  TERRADEV_GPU_TYPE: ""
  TERRADEV_REGION: ""
  TERRADEV_DEPLOYMENT_ID: ""
  HF_TOKEN: ""
  CUDA_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
  NCCL_P2P_DISABLE: "0"
  NCCL_IB_DISABLE: "0"
  VLLM_ATTENTION_BACKEND: "FLASH_ATTN"

service:
  port: 8000
  readiness_probe:
    path: /health
    initial_delay_seconds: 120
    period_seconds: 10
  replicas: 1

# Terradev MoE scheduling hints
scheduling:
  prefer_nvlink: true
  min_gpu_memory_gb: 80
  min_nvlink_bandwidth_gbps: 450
  prefer_same_switch: true
  topology: single_node
  moe_optimized: true
