# GLM-5 Inference Service — LoadBalancer with health checks
# Exposes OpenAI-compatible API on port 8000
apiVersion: v1
kind: Service
metadata:
  name: glm5-inference
  namespace: glm-5-inference
  labels:
    app.kubernetes.io/name: glm-5
    app.kubernetes.io/component: inference-api
    app.kubernetes.io/managed-by: terradev
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: glm-5
  ports:
    - name: inference-api
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 8000
      protocol: TCP
  sessionAffinity: None
  externalTrafficPolicy: Local  # preserve client IP, reduce hops
---
# Internal ClusterIP service for inter-pod communication
apiVersion: v1
kind: Service
metadata:
  name: glm5-internal
  namespace: glm-5-inference
  labels:
    app.kubernetes.io/name: glm-5
    app.kubernetes.io/component: internal
spec:
  type: ClusterIP
  clusterIP: None  # headless service for direct pod addressing
  selector:
    app.kubernetes.io/name: glm-5
  ports:
    - name: http
      port: 8000
      targetPort: 8000
