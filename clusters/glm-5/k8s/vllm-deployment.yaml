# GLM-5 vLLM Serving Deployment
# 744B MoE model with TP=8 across 8× H100 SXM GPUs
# Includes MTP speculative decoding and tool calling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glm5-vllm
  namespace: glm-5-inference
  labels:
    app.kubernetes.io/name: glm-5
    app.kubernetes.io/component: vllm-serving
    app.kubernetes.io/managed-by: terradev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glm-5
      app.kubernetes.io/component: vllm-serving
  strategy:
    type: Recreate  # GPU workloads cannot do rolling updates
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glm-5
        app.kubernetes.io/component: vllm-serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Node selection — require 8× H100 SXM with NVLink
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3
        nvidia.com/gpu.count: "8"
        topology.kubernetes.io/zone: us-east-1a
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: dedicated
          operator: Equal
          value: gpu-inference
          effect: NoSchedule
      # Topology spread — keep all GPUs on same NUMA node
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: glm-5

      # Init container — download model weights
      initContainers:
        - name: model-downloader
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              pip install -q huggingface-hub
              python3 -c "
              from huggingface_hub import snapshot_download
              import os
              token = os.environ.get('HF_TOKEN', '')
              if os.path.exists('/models/GLM-5-FP8/config.json'):
                  print('✅ Model weights already cached, skipping download')
              else:
                  print('📦 Downloading GLM-5-FP8 weights...')
                  snapshot_download(
                      'zai-org/GLM-5-FP8',
                      local_dir='/models/GLM-5-FP8',
                      token=token if token else None,
                      max_workers=8
                  )
                  print('✅ Model download complete')
              "
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: glm5-secrets
                  key: hf-token
                  optional: true
          volumeMounts:
            - name: model-cache
              mountPath: /models
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "32Gi"

      containers:
        - name: vllm-server
          image: vllm/vllm-openai:nightly
          command:
            - vllm
            - serve
            - /models/GLM-5-FP8
          args:
            - --tensor-parallel-size=1
            - --data-parallel-size=8
            - --gpu-memory-utilization=0.85
            - --enable-expert-parallel
            - --enable-eplb
            - --enable-dbo
            - --speculative-config.method=mtp
            - --speculative-config.num_speculative_tokens=1
            - --tool-call-parser=glm47
            - --reasoning-parser=glm45
            - --enable-auto-tool-choice
            - --served-model-name=glm-5-fp8
            - --host=0.0.0.0
            - --port=8000
            - --max-model-len=32768
            - --dtype=auto
            - --trust-remote-code
            # ── Auto-applied cost optimizations (Terradev defaults) ───
            - --kv-connector=offloading              # KV cache → CPU DRAM (up to 9x throughput)
            - --enable-sleep-mode                    # Auto-sleep on idle (18-200x faster than restart)
            # ── Multi-LoRA (uncomment + add your adapters) ────────────
            # - --enable-lora
            # - --max-loras=8
            # - --max-lora-rank=64
            # - --lora-modules=customer-a=/adapters/customer-a
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1,2,3,4,5,6,7"
            - name: NCCL_P2P_DISABLE
              value: "0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASH_ATTN"
            - name: VLLM_USE_DEEP_GEMM
              value: "1"
            - name: VLLM_ALL2ALL_BACKEND
              value: "deepep_low_latency"
            - name: VLLM_SERVER_DEV_MODE
              value: "1"                          # Required for auto-sleep/wake
            - name: TRANSFORMERS_CACHE
              value: "/models/cache"
            - name: HF_HOME
              value: "/models/cache"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Startup probe — model loading takes 2-5 min
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              nvidia.com/gpu: "8"
              cpu: "64"
              memory: "256Gi"
            limits:
              nvidia.com/gpu: "8"
              cpu: "96"
              memory: "512Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: dshm
              mountPath: /dev/shm

      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: glm5-model-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi

      terminationGracePeriodSeconds: 60
      restartPolicy: Always
---
# Secret for HuggingFace token
apiVersion: v1
kind: Secret
metadata:
  name: glm5-secrets
  namespace: glm-5-inference
type: Opaque
data:
  # Base64-encode your HF_TOKEN: echo -n "hf_xxx" | base64
  hf-token: ""
